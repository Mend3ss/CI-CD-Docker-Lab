name: Docker

on:
#  workflow_call: #Permite que esse workflow seja chamado por outros workflows, como o "go.yml" por exemplo.
  workflow_call:

jobs:

  docker:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3 #Utiliza dados que estão aramanzenados no ambiente

    - name: Set up Docker Build
      uses: docker/setup-buildx-action@v2 #Configura o ambiente para construção de imagens Docker

    - name: Docker Login
      uses: docker/login-action@v2 #Realiza login no Docker Hub
      with:
        username: ${{ secrets.DOCKER_USERNAME }} #Utiliza o nome de usuário armazenado nos segredos do repositório
        password: ${{ secrets.DOCKER_PASSWORD }} #Utiliza a senha armazenada nos segredos do repositório