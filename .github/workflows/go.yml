name: Go

on:
  push:
    branches: [ '*' ]
  pull_request:
    branches: [ '*' ]

jobs:

  test:
    runs-on: ubuntu-latest
    env:
      USER: ${{ secrets.USER }}
      PASSWORD: ${{ secrets.PASSWORD }}
      DBNAME: ${{ secrets.DBNAME }}
      HOST: ${{ secrets.HOST }}
      PORT: ${{ secrets.PORT }}
    strategy:
      matrix:
        go_version: ['1.18', '1.17', '>=1.18']
    steps:
    - uses: actions/checkout@v3

    - name: Set up Go
      uses: actions/setup-go@v3
      with:
        go-version: ${{ matrix.go_version }}
      
    - name: Build-DB
      run: docker compose build
      
    - name: Create-DB
      run: docker compose up -d

    - name: Test
      run: go test -v main_test.go
      
  
  build:
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: ['ubuntu-latest', 'ubuntu-24.04']
    steps:
    - uses: actions/checkout@v3
    - name: Build
      run: go build -v main.go
  
  docker:
    needs: build #Esse job (docker) rodara após a execução do job "build"
    runs-on: ubuntu-latest
    steps:
    - uses: ./.github/workflows/Docker.yml #O job "docker" rodara com base no conteundo de "Docker.yml"
    - name: Build Docker Image
      run: docker build -t my-go-app .
